<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS FLEXBOX - ALIGN SELF</title>
    <style>
        .container {
            border: 1px solid black;
            display: flex;
            height: 300px;
            margin: auto;
            width: 500px;
        }

        .keep {
            align-self: center;
            background-color: #FAA488;
            display: flex;
            justify-content: center;
            width: 150px;
            list-style: none;
        }

        .change {
            /* Altere a propriedade align-self. */
            /* Primeira Modificação */
            /* align-self: auto; */

            /* Segunda Modificação */
            /* align-self: baseline; */

            /* Terceira Modificação */
            /* align-self: center; */

            /* Quarta Modificação */
            /* align-self: flex-end; */

            /* Quinta Modificação */
            /* align-self: flex-start; */

            /* Sexta Modificação */
            align-self: stretch;

            background-color: #FBD26A;
            display: flex;
            justify-content: center;
            width: 200px;
            list-style: none;
        }
    </style>
</head>

<body>
    <ul class="container">
        <li class="keep">REFERÊNCIA</li>
        <li class="change">ELEMENTO TESTE</li>
        <li class="keep">REFERÊNCIA</li>
    </ul>
</body>

</html>
